name: PR Agent

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

jobs:
  pr_agent_job:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read
    name: Run PR Agent

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PR-Agent
        run: pip install pr-agent

      - name: Auto-describe PR
        if: github.event_name == 'pull_request' && github.event.action == 'opened'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB__USER_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # ← this was missing
          GROQ__KEY: ${{ secrets.GROQ_API_KEY }}
          CONFIG__MODEL: "groq/llama-3.3-70b-versatile"
        run: |
          python -m pr_agent.cli \
            --pr_url=${{ github.event.pull_request.html_url }} \
            describe

      - name: Auto-review PR
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB__USER_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # ← this was missing
          GROQ__KEY: ${{ secrets.GROQ_API_KEY }}
          CONFIG__MODEL: "groq/llama-3.3-70b-versatile"
        run: |
          python -m pr_agent.cli \
            --pr_url=${{ github.event.pull_request.html_url }} \
            review

      - name: Handle slash command
        if: |
          github.event_name == 'issue_comment' &&
          github.event.issue.pull_request != null &&
          startsWith(github.event.comment.body, '/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB__USER_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # ← this was missing
          GROQ__KEY: ${{ secrets.GROQ_API_KEY }}
          CONFIG__MODEL: "groq/llama-3.3-70b-versatile"
        run: |
          PR_URL="https://github.com/${{ github.repository }}/pull/${{ github.event.issue.number }}"
          COMMENT="${{ github.event.comment.body }}"
          CMD=$(echo "$COMMENT" | awk '{print $1}' | sed 's|/||')
          ARGS=$(echo "$COMMENT" | cut -d' ' -f2-)
          python -m pr_agent.cli --pr_url="$PR_URL" "$CMD" "$ARGS"