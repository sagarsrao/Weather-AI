# PR-Agent Local Configuration File
# For a full list of options, see: https://github.com/The-PR-Agent/pr-agent/blob/main/pr_agent/settings/configuration.toml

[config]
# Swapped from Gemini → Groq (free, open-source Llama 3.3 70B)
model = "groq/llama-3.3-70b-versatile"
fallback_models = ["groq/llama-3.1-70b-versatile"]
custom_model_max_tokens = 32000   # ← add this line
response_language = "en-US"
output_relevant_configurations = false

[pr_reviewer]
num_code_suggestions = 4
inline_code_comments = true
extra_instructions = """
- Verify Kotlin coding conventions, including null-safety best practices (avoiding unnecessary double bangs `!!`).
- Look for potential memory leaks, especially in Android components (e.g., holding onto Context, LifecycleOwners, or View references improperly).
- Suggest improvements for Jetpack Compose UI code if applicable (e.g., proper state hoisting, avoiding unnecessary recompositions).
- Ensure resource strings, dimensions, and colors are externalized to XML/Compose resources rather than hardcoded.
- Suggest unit or UI tests for any new business or presentation logic.
"""

[pr_description]
publish_labels = true
generate_description_changelog = true

[github_action_config]
auto_review = true
auto_describe = true

[ignore]
glob = [
    "*.idea/*",
    "*.gradle/*",
    "**/build/*",
    "gradle/wrapper/*",
    "gradlew",
    "gradlew.bat",
    "local.properties",
    "**/*.png",
    "**/*.jpg",
    "**/*.webp",
]
