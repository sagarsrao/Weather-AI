# PR-Agent Local Configuration File
# For a full list of options, see: https://github.com/The-PR-Agent/pr-agent/blob/main/pr_agent/settings/configuration.toml

[config]
# Default model (configured for Google Gemini)
model = "gemini/gemini-1.5-flash"
fallback_models = ["gemini/gemini-1.5-pro"]

# Language of the PR-Agent responses
response_language = "en-US"

# Output configuration details in the log (useful for debugging)
output_relevant_configurations = false

[pr_reviewer]
# Number of code suggestions to provide in the review
num_code_suggestions = 4

# Publish review suggestions as inline comments directly in the code diff
inline_code_comments = true

# Custom guidelines for the AI reviewer tailored for an Android/Kotlin project
extra_instructions = """
- Verify Kotlin coding conventions, including null-safety best practices (avoiding unnecessary double bangs `!!`).
- Look for potential memory leaks, especially in Android components (e.g., holding onto Context, LifecycleOwners, or View references improperly).
- Suggest improvements for Jetpack Compose UI code if applicable (e.g., proper state hoisting, avoiding unnecessary recompositions).
- Ensure resource strings, dimensions, and colors are externalized to XML/Compose resources rather than hardcoded.
- Suggest unit or UI tests for any new business or presentation logic.
"""

[pr_description]
# Automatically publish labels (e.g. bug, enhancement) based on PR content
publish_labels = true

# Enable/disable generating a list of changes in the PR description
generate_description_changelog = true

[github_action_config]
# Automatically run the /review command when a PR is opened
auto_review = true

# Automatically run the /describe command when a PR is opened
auto_describe = true

[ignore]
# Files or directories to ignore during analysis to reduce noise and token usage
glob = [
    "*.idea/*",
    "*.gradle/*",
    "**/build/*",
    "gradle/wrapper/*",
    "gradlew",
    "gradlew.bat",
    "local.properties",
    "**/*.png",
    "**/*.jpg",
    "**/*.webp",
]
